name: Hourly snapshots

on:
  schedule:
    - cron: "30 * * * *"   # offset from the daily 15:00 job
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape            # shared with the daily workflow so pushes never race
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: OpenRouter perf snapshot
        run: python3 scraper/perf_snapshot.py

      - name: vast.ai GPU market snapshot
        run: python3 scraper/vast_snapshot.py

      - name: Commit and push data
        run: |
          git config user.name "openrouter-scraper[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "no data changes"
          else
            git commit -m "hourly: $(date -u '+%F %H:%M')"
            git pull --rebase origin main
            git push origin main
          fi

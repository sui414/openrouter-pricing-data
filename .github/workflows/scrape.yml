name: Daily OpenRouter scrape

on:
  schedule:
    - cron: "0 15 * * *"   # 8:00 AM PDT / 7:00 AM PST
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Run scraper
        run: python3 scraper/scrape.py

      - name: ORNN index snapshot
        run: python3 scraper/ornn_snapshot.py

      - name: Commit and push data
        run: |
          git config user.name "openrouter-scraper[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "no data changes"
            exit 0
          fi
          git commit -m "data: $(date -u +%F)"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && exit 0
            echo "push attempt $i failed; retrying"
            sleep 10
          done
          exit 1
